events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 20M;

    upstream neo_app {
        server neo-app:3000;
    }

    upstream api_server {
        server api-server:8000;
    }

    upstream airflow_webserver {
        server airflow-webserver:8080;
    }

    server {
        listen 80;
        server_name localhost;

        # FastAPI backend — strip /api prefix before forwarding
        # e.g. GET /api/predict  →  http://api-server:8000/predict
        location /api/ {
            proxy_pass         http://api_server/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Redirect bare /airflow → /airflow/ so the prefix-match below always applies
        location = /airflow {
            return 301 /airflow/;
        }

        # Airflow webserver — substitute /airflow/ → /airflow/ so the full prefix
        # is preserved when forwarding (Airflow mounts all routes under /airflow/)
        # proxy_redirect rewrites absolute Location headers that expose :8080
        location /airflow/ {
            proxy_pass         http://airflow_webserver/airflow/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_redirect     http://airflow-webserver:8080/ /;
        }

        # Next.js frontend — catch-all, must be last
        location / {
            proxy_pass         http://neo_app;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        'upgrade';
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
